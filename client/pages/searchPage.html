<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Search Vehicle</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="../script/search.js"></script>
        <style>
            body {
                background-color: #f8f9fa;
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
            }

            h2 {
                color: #111;
                font-size: 3.5rem;
                letter-spacing: -1px;
            }

            p.text-muted {
                font-size: 1.25rem;
                margin-bottom: 2rem;
            }

            label {
                font-size: 1.1rem;
                font-weight: 600;
                color: #333;
                margin-bottom: 0.6rem;
                display: block;
            }

            .card {
                border: none;
                border-radius: 20px;
                padding: 20px;
            }

            .card-body {
                padding: 3rem !important;
            }

            .form-control,
            .form-select {
                border-radius: 12px;
                font-size: 1.05rem;
                padding: 14px 18px;
                background-color: #fcfcfc;
                border: 1px solid #dee2e6;
                transition: all 0.2s ease;
            }

            .form-control:focus {
                background-color: #fff;
                box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
                border-color: #111;
            }

            .btn-dark {
                border-radius: 12px;
                padding: 16px;
                font-size: 1.2rem;
                font-weight: 600;
                background-color: #111;
                margin-top: 20px;
            }

            .result-container {
                margin-top: 30px;
                display: none;
            }

            .result-card {
                border-left: 5px solid #111;
                margin-bottom: 15px;
            }

            .navbar-nav .nav-link:hover {
                background-color: #111111 !important;
                color: #ffffff !important;
                border-radius: 5px;
                transition: all 0.3s ease;
            }

            @media screen and (max-width: 768px) {
                h2 {
                    font-size: 2.5rem;
                }

                .card-body {
                    padding: 1.5rem !important;
                }
            }
        </style>
    </head>

    <body>
        <nav
            class="navbar navbar-expand-lg bg-body-tertiary shadow-sm sticky-top gap-3"
        >
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <h3 style="padding: 3px; color: black">
                        Fuel
                        <span
                            style="
                                background-color: #111;
                                color: white;
                                padding: 5px;
                                border-radius: 5px;
                            "
                        >
                            Pass
                        </span>
                    </h3>
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div
                    class="collapse navbar-collapse"
                    id="navbarSupportedContent"
                >
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="./registerPage.html"
                                >Register</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link active"
                                aria-current="page"
                                href="./searchPage.html"
                                style="
                                    background-color: #484747;
                                    color: white;
                                    border-radius: 5px;
                                "
                                >Search</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./updateVehicle.html"
                                >Update</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./findNearestStation.html"
                                >Nearest Station</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Delete</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Search Vehicle</h2>
                        <p class="text-muted">
                            Find vehicle by Owner NIC or Registration Number
                        </p>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <!-- Search by NIC -->
                            <div class="mb-4">
                                <label class="form-label"
                                    >Search by Owner NIC</label
                                >
                                <div class="input-group">
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="nicInput"
                                        placeholder="123456789V"
                                    />
                                    <button
                                        class="btn btn-dark"
                                        type="button"
                                        id="searchNicBtn"
                                    >
                                        Search
                                    </button>
                                </div>
                            </div>

                            <!-- Divider -->
                            <hr />

                            <!-- Search by RegNo -->
                            <div class="mb-4">
                                <label class="form-label"
                                    >Search by Registration Number</label
                                >
                                <div class="input-group">
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="regNoInput"
                                        placeholder="ABC-1234"
                                    />
                                    <button
                                        class="btn btn-dark"
                                        type="button"
                                        id="searchRegNoBtn"
                                    >
                                        Search
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Results Section -->
                    <div class="result-container" id="resultContainer">
                        <div class="text-center mb-3">
                            <h4 class="fw-bold">Search Results</h4>
                        </div>
                        <div id="resultsDiv"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
                id="searchToast"
                class="toast align-items-center border-0 shadow-lg"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
            >
                <div class="d-flex">
                    <div class="toast-body fs-2p-3" id="toastContent"></div>
                    <button
                        type="button"
                        class="btn-close btn-close-white me-3 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Close"
                    ></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
