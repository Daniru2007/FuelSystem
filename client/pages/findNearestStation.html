<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <title>Find Nearest Station</title>
        <style>
            body {
                background-color: #f8f9fa;
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            h2 {
                color: #111;
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }
            .form-control {
                border-radius: 8px;
                padding: 10px 14px;
                margin-bottom: 1rem;
            }
            .btn {
                border-radius: 8px;
                padding: 10px 20px;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center fw-bold">Find Nearest Station</h2>

                    <div class="mb-3">
                        <label class="form-label">Longitude</label>
                        <input
                            type="number"
                            id="longitude"
                            class="form-control"
                            placeholder="Enter longitude"
                            step="0.000001"
                        />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Latitude</label>
                        <input
                            type="number"
                            id="latitude"
                            class="form-control"
                            placeholder="Enter latitude"
                            step="0.000001"
                        />
                    </div>

                    <button
                        type="button"
                        id="gpsButton"
                        class="btn btn-dark w-100 mb-3"
                    >
                        Get Current Location (GPS)
                    </button>

                    <button
                        type="button"
                        id="searchStationButton"
                        class="btn btn-primary w-100"
                    >
                        Find Nearest Station
                    </button>
                </div>
            </div>
        </div>
        <script src="../script/findNearestStation.js"></script>
    </body>
</html>
