<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <title>Nearest Station</title>
        <style>
            body {
                background-color: #f8f9fa;
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            h2 {
                color: #111;
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }
            .form-control {
                border-radius: 8px;
                padding: 10px 14px;
                margin-bottom: 1rem;
            }
            .btn {
                border-radius: 8px;
                padding: 10px 20px;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <nav
            class="navbar navbar-expand-lg bg-body-tertiary shadow-sm sticky-top gap-3"
        >
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <h3 style="padding: 3px; color: black">
                        Fuel
                        <span
                            style="
                                background-color: #111;
                                color: white;
                                padding: 5px;
                                border-radius: 5px;
                            "
                        >
                            Pass
                        </span>
                    </h3>
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div
                    class="collapse navbar-collapse"
                    id="navbarSupportedContent"
                >
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="./registerPage.html"
                                >Register</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./searchPage.html"
                                >Search</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./updateVehicle.html"
                                >Update</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link active"
                                aria-current="page"
                                href="./findNearestStation.html"
                                style="
                                    background-color: #484747;
                                    color: white;
                                    border-radius: 5px;
                                "
                                >Nearest Station</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Delete</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center fw-bold">Nearest Station</h2>

                    <div class="mb-3">
                        <label class="form-label">Longitude</label>
                        <input
                            type="number"
                            id="longitude"
                            class="form-control"
                            placeholder="Enter longitude"
                            step="0.000001"
                        />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Latitude</label>
                        <input
                            type="number"
                            id="latitude"
                            class="form-control"
                            placeholder="Enter latitude"
                            step="0.000001"
                        />
                    </div>

                    <button
                        type="button"
                        id="gpsButton"
                        class="btn btn-dark w-100 mb-3"
                    >
                        Get Current Location (GPS)
                    </button>

                    <button
                        type="button"
                        id="searchStationButton"
                        class="btn btn-primary w-100"
                    >
                        Nearest Station
                    </button>

                    <div id="stationResult" class="mt-4" style="display: none">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title" id="stationName"></h5>
                                <p class="card-text">
                                    <strong>Brand:</strong>
                                    <span id="stationBrand"></span>
                                </p>
                                <p class="card-text">
                                    <strong>City:</strong>
                                    <span id="stationCity"></span>
                                </p>
                                <p class="card-text">
                                    <strong>Street:</strong>
                                    <span id="stationStreet"></span>
                                </p>
                                <p class="card-text">
                                    <strong>Coordinates:</strong>
                                    <span id="stationCoords"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                    <div id="mapContainer" class="mt-3" style="display: none">
                        <div class="card">
                            <div class="card-body p-0">
                                <iframe
                                    id="mapFrame"
                                    width="100%"
                                    height="320"
                                    frameborder="0"
                                    style="border: 0"
                                ></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../script/findNearestStation.js"></script>
    </body>
</html>
