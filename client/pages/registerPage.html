<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel QR Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        h2 { color: #333;
             font-size: 5rem; }
        label { 
            font-size: 1rem; 
            font-weight: 350px; 
            color: #444; 
            margin-bottom: 0.4rem;
        }
        

       
        .card { border: none; border-radius: 12px; }
        .form-control, .form-select { border-radius: 8px; font-size: 14px; background-color: #ffffff; }
        .btn-dark { border-radius: 8px; padding: 10px; font-weight: 500; background-color: #111; }
        .section-header { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #6c757d; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .vr-line { border-left: 1px solid #eee; height: 100%; }

        @media screen and (max-width: 768px) {
            .vr-line { border-left: none; border-top: 1px solid #eee; margin: 20px 0; }
            h2 { font-size: 2.5rem; font-weight: 700; }
            
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold">Vehicle Registration</h2>
                <p class="text-muted">Fill in both vehicle and owner information to proceed.</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="registrationForm">
                        <div class="row">
                            
                            <div class="col-md-6 pe-md-4">
                                <div class="section-header" style="font-size: 1.5rem;">Vehicle Details <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLWNhci1pY29uIGx1Y2lkZS1jYXIiPjxwYXRoIGQ9Ik0xOSAxN2gyYy42IDAgMS0uNCAxLTF2LTNjMC0uOS0uNy0xLjctMS41LTEuOUMxOC43IDEwLjYgMTYgMTAgMTYgMTBzLTEuMy0xLjQtMi4yLTIuM2MtLjUtLjQtMS4xLS43LTEuOC0uN0g1Yy0uNiAwLTEuMS40LTEuNC45bC0xLjQgMi45QTMuNyAzLjcgMCAwIDAgMiAxMnY0YzAgLjYuNCAxIDEgMWgyIi8+PGNpcmNsZSBjeD0iNyIgY3k9IjE3IiByPSIyIi8+PHBhdGggZD0iTTkgMTdoNiIvPjxjaXJjbGUgY3g9IjE3IiBjeT0iMTciIHI9IjIiLz48L3N2Zz4=" alt="" style></div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-medium small">Registration Number</label>
                                    <input type="text" class="form-control" name="regNo" placeholder="ABC-1234" required>
                                </div>

                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <label class="form-label fw-medium small">Vehicle Type</label>
                                        <input type="text" class="form-control" name="vehicleType" placeholder="Car / Bike" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-medium small">Vehicle Model</label>
                                        <input type="text" class="form-control" name="vehicleModel" placeholder="Toyota Vitz" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium small">Fuel Type</label>
                                    <select class="form-select" name="fuelType" required>
                                        <option value="" disabled selected>Select fuel type</option>
                                        <option value="Petrol">Petrol</option>
                                        <option value="Diesel">Diesel</option>
                                        <option value="Electric">Electric</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium small">Nearest Station</label>
                                    <input type="text" class="form-control" name="nearStation" placeholder="Colombo City Fuel" required>
                                </div>
                            </div>

                            <div class="col-md-6 ps-md-4 vr-line">
                                <div class="section-header" style="font-size: 1.5rem;">Owner Details <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLXVzZXItaWNvbiBsdWNpZGUtdXNlciI+PHBhdGggZD0iTTE5IDIxdi0yYTQgNCAwIDAgMC00LTRIOWE0IDQgMCAwIDAtNCA0djIiLz48Y2lyY2xlIGN4PSIxMiIgY3k9IjciIHI9IjQiLz48L3N2Zz4=" alt=""></div>
                                
                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <label class="form-label fw-medium small">First Name</label>
                                        <input type="text" class="form-control" name="firstName" placeholder="Kamal" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label fw-medium small">Last Name</label>
                                        <input type="text" class="form-control" name="lastName" placeholder="Perera" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium small">Owner NIC</label>
                                    <input type="text" class="form-control" name="ownerNIC" placeholder="123456789V" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium small">Email Address</label>
                                    <input type="email" class="form-control" name="email" placeholder="kamal@gmail.com" required>
                                </div>
                            </div>

                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-dark w-100">Register Vehicle <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLWZpbGUtcGx1cy1pY29uIGx1Y2lkZS1maWxlLXBsdXMiPjxwYXRoIGQ9Ik02IDIyYTIgMiAwIDAgMS0yLTJWNGEyIDIgMCAwIDEgMi0yaDhhMi40IDIuNCAwIDAgMSAxLjcwNC43MDZsMy41ODggMy41ODhBMi40IDIuNCAwIDAgMSAyMCA4djEyYTIgMiAwIDAgMS0yIDJ6Ii8+PHBhdGggZD0iTTE0IDJ2NWExIDEgMCAwIDAgMSAxaDUiLz48cGF0aCBkPSJNOSAxNWg2Ii8+PHBhdGggZD0iTTEyIDE4di02Ii8+PC9zdmc+" alt="" style="filter: invert(5);"></button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
